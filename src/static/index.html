<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Activities</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Mergington High School</h1>
      <h2>Extracurricular Activities</h2>
    </header>

    <main>
      <section id="activities-container">
        <h3>Available Activities</h3>
        <div id="activities-list">
          <!-- Activities will be loaded here -->
          <p>Loading activities...</p>
        </div>
      </section>

      <section id="signup-container">
        <h3>Sign Up for an Activity</h3>
        <form id="signup-form">
          <div class="form-group">
            <label for="email">Student Email:</label>
            <input type="email" id="email" required placeholder="your-email@mergington.edu" />
          </div>
          <div class="form-group">
            <label for="activity">Select Activity:</label>
            <select id="activity" required>
              <option value="">-- Select an activity --</option>
              <!-- Activity options will be loaded here -->
            </select>
          </div>
          <button type="submit">Sign Up</button>
        </form>
      </section>

      <section id="activity-actions-container">
        <h3>Activity Actions</h3>
        <form id="favorite-form">
          <div class="form-group">
            <label for="favorite-email">Student Email:</label>
            <input type="email" id="favorite-email" required placeholder="your-email@mergington.edu" />
          </div>
          <div class="form-group">
            <label for="favorite-activity">Activity:</label>
            <select id="favorite-activity" required>
              <option value="">-- Select an activity --</option>
            </select>
          </div>
          <button type="submit">Toggle Favorite</button>
        </form>

        <form id="attendance-form">
          <div class="form-group">
            <label for="attendance-email">Student Email:</label>
            <input type="email" id="attendance-email" required placeholder="your-email@mergington.edu" />
          </div>
          <div class="form-group">
            <label for="attendance-activity">Activity:</label>
            <select id="attendance-activity" required>
              <option value="">-- Select an activity --</option>
            </select>
          </div>
          <div class="form-group">
            <label for="attendance-status">Attendance Status:</label>
            <select id="attendance-status" required>
              <option value="">-- Select status --</option>
              <option value="present">Present</option>
              <option value="absent">Absent</option>
            </select>
          </div>
          <button type="submit">Record Attendance</button>
        </form>
        <div id="message" class="hidden"></div>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 Mergington High School</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
